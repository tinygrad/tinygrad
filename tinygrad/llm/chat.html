<!DOCTYPE html><html><head><title>tinygrad chat</title><style>
  * { margin: 0 }
  body { background: #212121; color: #e3e3e3; font-family: system-ui;
         height: 100vh; display: flex; flex-direction: column }
  #chat { flex: 1; overflow-y: auto; padding: 20px }
  .msg { padding: 10px 16px; margin: 8px 0; white-space: pre-wrap; border-radius: 18px }
  .user { background: #2f2f2f; margin-left: auto; width: fit-content; max-width: 70% }
  #input { flex: 1; margin-right: 12px; padding: 14px 20px;
           background: #2f2f2f; color: inherit; font: inherit;
           border: none; outline: none; resize: none; border-radius: 24px; field-sizing: content }
</style></head><body><div id="chat"></div>
<div style="display:flex;align-items:center;width:calc(100% - 40px);max-width:768px;margin:20px auto">
  <textarea id="input" rows="1" placeholder="Ask anything" autofocus></textarea>
  <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="handleFile(event)">
<button id="imgBtn" style="width:44px;height:44px;display:flex;justify-content:center;align-items:center;border:none;border-radius:24px;background:#2f2f2f;color:#e3e3e3;cursor:pointer"
    onclick="document.getElementById('fileInput').click()">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>
    </svg>
  </button>
</div>
<script>
  let image = null, origSvg = imgBtn.innerHTML;
  fetch('/v1/models').then(r=>r.json()).then(m => { if (!m.data[0].id.includes('Qwen3Vl')) { imgBtn.style.display = 'none'; input.style.marginRight = '0'; }});
  async function handleFile(e) {
    if (!e.target.files[0]) return;
    const reader = new FileReader();
    reader.onload = () => { image = reader.result; imgBtn.style.padding = '0'; imgBtn.innerHTML = `<img src="${reader.result}" style="width:100%;height:100%;border-radius:24px;object-fit:cover">`; };
    reader.readAsDataURL(e.target.files[0]);
  }
  input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); send() } }
  const msgs = [];
  async function send() {
    if (!input.value.trim()) return;
    const content = [{type:'input_text',text:input.value.trim()}];
    chat.innerHTML += '<div class="msg user">' + (image ? `<img src="${image}" style="max-width:160px;max-height:160px;border-radius:12px;display:block;margin-bottom:8px">` : '') + input.value.trim().replace(/</g, '&lt;') + '</div>';
    if (image) {
      content.push({type:'input_image',image_url:image});
      image = null; imgBtn.innerHTML = origSvg; imgBtn.style.padding = '';
    }
    msgs.push({role:'user', content});
    input.value = '';
    const d = document.createElement('div'); d.className = 'msg'; chat.appendChild(d);
    const r = await fetch('/v1/chat/completions', {method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model: 'llama', messages: msgs, stream: true, temperature: 0.7})});
    let buf = '';
    for (const rd = r.body.getReader(), dec = new TextDecoder();;) {
      const {done, value} = await rd.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const ln of lines)
        if (ln.startsWith('data: ') && !ln.includes('[DONE]'))
          try { d.textContent += JSON.parse(ln.slice(6)).choices[0]?.delta?.content || '' } catch {}
      chat.scrollTop = chat.scrollHeight;
    }
    msgs.push({role: 'assistant', content: d.textContent});
  }
</script></body></html>
